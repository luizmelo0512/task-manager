
services:
  db:
    image: postgres:15-alpine
    container_name: task-manager-db
    restart: always
    environment:
      POSTGRES_DB: task_manager
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-api
    volumes:
      - ./backend:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - db

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-web
    environment:
      - DOCKER_ENV=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api
